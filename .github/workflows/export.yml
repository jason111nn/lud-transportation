name: LUD Project Environment Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-environment:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v4

    - name: 設定 Node.js 環境
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安裝依賴
      run: npm install

    - name: 執行專案打包測試
      run: npm run build