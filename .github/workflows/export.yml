name: LUD Project PDF Export

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v4

    - name: 設定 Node.js 環境
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安裝依賴
      run: npm install

    - name: 執行 PDF 渲染與匯出
      env:
        MY_TOKEN: ${{ secrets.MY_TOKEN }} 
      run: node export_final.js

    - name: 儲存 PDF 成果 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: LUD-Project-Report
        path: dist/*.pdf # 根據你產出的實際位置調整