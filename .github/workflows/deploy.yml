name: Deploy LUD via GitHub Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安裝依賴與編譯
        run: |
          npm install
          npm run build

      - name: 設定 Pages 環境
        uses: actions/configure-pages@v4

      - name: 上傳打包產物
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 預設產出在 dist 資料夾
          path: './dist'

      - name: 執行部署
        id: deployment
        uses: actions/deploy-pages@v4